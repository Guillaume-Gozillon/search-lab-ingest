# Stack du lab. Démarrée par le Makefile, qui ajoute docker-compose.gpu.yml quand la
# machine expose un runtime nvidia : `make start`.

services:
  elasticsearch:
    image: elasticsearch:9.0.1
    container_name: search-lab-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      # Construire un graphe HNSW sur 1,4M vecteurs laissait le heap à 69 % d'occupation
      # avec 2g. Réglable par ES_HEAP dans .env.
      - ES_JAVA_OPTS=-Xms${ES_HEAP:-6g} -Xmx${ES_HEAP:-6g}
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    # Très au-dessus du heap, et c'est voulu : les fichiers Lucene sont mmapés, donc leur
    # page cache est facturé au cgroup du conteneur. Les vecteurs quantifiés int8 pèsent
    # à eux seuls ~1,1 Go (1,4M × 768). Une limite au ras du heap fait tuer le JVM par
    # l'OOM killer au moment de la fusion des segments.
    mem_limit: 12g
    healthcheck:
      test: curl -sf http://localhost:9200/_cluster/health | grep -q '"status":"green"\|"status":"yellow"'
      interval: 10s
      timeout: 5s
      retries: 10

  kibana:
    image: kibana:9.0.1
    container_name: search-lab-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    mem_limit: 1g

  # Le moteur d'embedding du projet.
  #
  # Le tag `120-*` cible Blackwell / compute capability 12.0 (RTX 50X0). `latest` est
  # compilé pour Ampere 8.0 et `89-*` pour Ada : ni l'un ni l'autre ne démarre sur sm_120.
  # HuggingFace marque cette variante « experimental ».
  #
  # Pas de healthcheck : le premier démarrage télécharge le modèle depuis HuggingFace, et
  # l'image ne garantit pas la présence de curl. `up --wait` n'attend donc que l'état
  # « running » — suivre `docker logs -f search-lab-tei` jusqu'à « Ready » avant d'ingérer.
  text-embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:120-1.9.3
    container_name: search-lab-tei
    command:
      - --model-id=nomic-ai/nomic-embed-text-v1.5
      # Révision épinglée. Le commit « v5 Transformers » du 2026-04-07 a ajouté
      # `max_position_embeddings` à un config.json qui déclarait déjà `n_positions` ;
      # TEI mappe les deux sur le même champ et refuse de démarrer :
      # « Failed to parse config.json: duplicate field max_position_embeddings ».
      # e5cf08aa est le dernier commit avant, mêmes poids, mean pooling identique.
      - --revision=e5cf08aadaa33385f5990def41f7a23405aec398
      - --dtype=float16
      # Défaut 32 : rejetterait tout --embed-batch plus large avec un 413.
      - --max-client-batch-size=512
      # Compte un permis par *input*, pas par requête : au défaut de 512, un seul lot de
      # 512 titres remplit la file et tous les lots concurrents repartent en 429
      # « Model is overloaded ». Il faut couvrir la fenêtre du client, soit
      # --workers × 2 × --embed-batch (8 × 512 = 4096 aux valeurs par défaut).
      - --max-concurrent-requests=8192
      - --max-batch-tokens=32768
      - --auto-truncate
    ports:
      - "8080:80"
    volumes:
      - hfcache:/data
    mem_limit: 4g

volumes:
  esdata:
  hfcache:
