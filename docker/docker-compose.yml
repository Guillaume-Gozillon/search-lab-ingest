# Dev machine (16GB RAM)
# Start: docker compose -f docker/docker-compose.yml up -d

services:
  elasticsearch:
    image: elasticsearch:9.0.1
    container_name: search-lab-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    mem_limit: 4g
    healthcheck:
      test: curl -sf http://localhost:9200/_cluster/health | grep -q '"status":"green"\|"status":"yellow"'
      interval: 10s
      timeout: 5s
      retries: 10

  kibana:
    image: kibana:9.0.1
    container_name: search-lab-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    mem_limit: 1g

volumes:
  esdata:
