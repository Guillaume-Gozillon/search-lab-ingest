# GPU override — Linux + nvidia-container-toolkit only.
# Ajouté automatiquement par le Makefile quand la machine expose un runtime nvidia ;
# `make start GPU=1` le force, `GPU=0` l'écarte.

services:
  # L'image de text-embeddings est une image CUDA : sans cette réservation elle n'a aucun
  # intérêt, et elle ne démarre pas. C'est aussi ce qui rend le diagnostic simple —
  # un conteneur qui atteint « Ready » a forcément le GPU.
  text-embeddings:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
