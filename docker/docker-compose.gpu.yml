# GPU override — Linux + nvidia-container-toolkit only.
# Ajouté automatiquement par le Makefile quand la machine expose un runtime nvidia ;
# `make start GPU=1` le force, `GPU=0` l'écarte.

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # text-embeddings est le moteur du projet et démarre par défaut. L'image est une image
  # CUDA : sans cette réservation elle n'a aucun intérêt — et c'est aussi pourquoi un
  # conteneur qui atteint « Ready » a forcément le GPU, contrairement à Ollama qui
  # retombe sur le CPU sans rien dire.
  text-embeddings:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
