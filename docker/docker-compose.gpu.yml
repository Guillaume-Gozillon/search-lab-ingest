# GPU override — Linux + nvidia-container-toolkit only.
# Ajouté automatiquement par le Makefile quand la machine expose un runtime nvidia ;
# `make start GPU=1` le force, `GPU=0` l'écarte.

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # text-embeddings garde le profil `tei` déclaré dans le fichier de base : cet override
  # ne le démarre pas, il lui donne le GPU quand `make start TEI=1` le démarre. L'image
  # est une image CUDA — sans cette réservation elle n'a aucun intérêt.
  text-embeddings:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
